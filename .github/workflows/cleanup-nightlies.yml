name: cleanup nightlies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.repository == 'goreleaser/goreleaser-pro'
    steps:
      - name: Delete old nightly releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list \
            --limit 100 \
            --json tagName,isPrerelease,publishedAt \
            --jq '[.[] | select(.isPrerelease and (.tagName | endswith("-nightly"))) | {tagName, publishedAt}] | sort_by(.publishedAt) | reverse | .[10:][].tagName' |
          while read -r tag; do
            gh release delete "$tag" --cleanup-tag --yes
          done
